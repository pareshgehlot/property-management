<div class="modal-backdrop" style="background: rgba(0, 0, 0, 0.5); position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1040;"></div>
<div style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1050; width: 100%; max-width: 450px; padding: 20px;">
  <div style="background: white; border-radius: 12px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); overflow: hidden;">
    <div style="padding: 20px; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; justify-content: space-between;">
      <h3 style="margin: 0; font-size: 18px; font-weight: 600;">🗑️ Confirm Delete</h3>
      <button type="button" (click)="onClose(false)" style="background: none; border: none; font-size: 24px; cursor: pointer; color: #6b7280;">×</button>
    </div>
    <div style="padding: 20px; color: #374151; line-height: 1.6;">
      <p style="margin: 0;">{{ message }}</p>
    </div>
    <div style="padding: 16px 20px; border-top: 1px solid #e5e7eb; display: flex; gap: 12px; justify-content: flex-end;">
      <button type="button" class="btn btn-secondary" (click)="onClose(false)">Cancel</button>
      <button type="button" class="btn btn-danger" (click)="onClose(true)">Delete Property</button>
    </div>
  </div>
</div>
