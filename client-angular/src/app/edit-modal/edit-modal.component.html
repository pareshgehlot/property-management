<div class="modal-backdrop" style="background: rgba(0, 0, 0, 0.5); position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1040;"></div>
<div style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1050; width: 100%; max-width: 500px; padding: 20px;">
  <div style="background: white; border-radius: 12px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); overflow: hidden;">
    <div style="padding: 20px; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; justify-content: space-between;">
      <h3 style="margin: 0; font-size: 18px; font-weight: 600;">✏️ Edit Property</h3>
      <button type="button" (click)="onCancel()" style="background: none; border: none; font-size: 24px; cursor: pointer; color: #6b7280;">×</button>
    </div>
    <div style="padding: 24px;">
      <div style="margin-bottom: 18px;">
        <label style="display: block; font-weight: 500; margin-bottom: 8px; color: #374151; font-size: 14px;">Property Name</label>
        <input class="input" style="width: 100%;" [(ngModel)]="name" placeholder="Enter property name" />
      </div>
      <div>
        <label style="display: block; font-weight: 500; margin-bottom: 8px; color: #374151; font-size: 14px;">ICS Feed URL</label>
        <input class="input" style="width: 100%;" [(ngModel)]="icsUrl" placeholder="https://..." />
      </div>
    </div>
    <div style="padding: 16px 20px; border-top: 1px solid #e5e7eb; display: flex; gap: 12px; justify-content: flex-end;">
      <button type="button" class="btn btn-secondary" (click)="onCancel()">Cancel</button>
      <button type="button" class="btn btn-primary" (click)="onSave()">Save Changes</button>
    </div>
  </div>
</div>
